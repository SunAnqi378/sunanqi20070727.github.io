<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>千里江山图 平移动画</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0057ff;
      font-family: Arial, sans-serif;
    }

    .scene {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .frame {
      width: 420px;
      height: 420px;
      border-radius: 18px;
      overflow: hidden;
      border: 6px solid rgba(255, 255, 255, 0.9);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
      background-color: #d8ecff;
      position: relative;
    }

    .panorama {
      position: absolute;
      inset: 0;
      background-image: url("https://k.sinaimg.cn/n/sinakd20201217s/32/w640h192/20201217/5d47-kfnaptt4705295.jpg/w700d1q75cms.jpg?by=cms_fixed_width");
      background-repeat: repeat-x;
      background-size: auto 100%;
      background-position: left center;
      animation: panRight 24s linear infinite;
    }

    @keyframes panRight {
      from {
        background-position: 0 center;
      }
      to {
        background-position: 1400px center;
      }
    }

    .caption {
      color: white;
      font-size: 16px;
      letter-spacing: 0.5px;
      text-align: center;
      opacity: 0.95;
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="frame">
      <div class="panorama"></div>
    </div>
    <div class="caption">
      Background-position animation: 0 → 1400px | 24s | infinite
    </div>
  </div>
</body>
</html>
